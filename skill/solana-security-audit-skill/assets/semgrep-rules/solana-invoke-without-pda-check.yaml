rules:
  - id: solana-invoke-signed-unchecked-program
    languages: [rust]
    severity: ERROR
    message: >-
      `Instruction` is built with a `program_id` taken from a caller-supplied
      `ctx.accounts.*.key` — if this struct is later passed to
      `invoke`/`invoke_signed`, an attacker can substitute a malicious program
      executing under the current signer seeds. Validate via
      `require_keys_eq!(ctx.accounts.<acct>.key(), <whitelist>)` before the CPI.
    pattern: |
      invoke_signed(&$IX, $ACCS, $SEEDS)
    metadata:
      category: security
      subcategory: solana
      anchor_ref: "#arbitrary_cpi"
