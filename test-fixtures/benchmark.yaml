#     (schema validation; runs in CI)
#
# Layout contract (keep stable, compare_benchmarks.py depends on it):
#
#   fixtures:
#     - name: <stable slug, used as taskId>
#       path: <relative to test-fixtures/>
#       scale: small | medium | large    # gating for per-scale timing
#       has_vuln: bool                   # Phase 6 FP/FN tagging
#       source:
#         repo: <upstream>
#         commit: <sha | n/a>
#         license: <SPDX id or "derived">
#       ground_truth:
#         - rule_id: <one of the 7 canonical rule ids or semgrep:<slug>>
#           severity: Critical | High | Medium | Low | Info
#           approx_line: <int>           # tolerance ±5 lines on match
#
# Aggregate counts (asserted in validate_benchmarks.py):
#   total: 17   (5 seed + 12 real-world)
#   has_vuln=true: 13      (>= 5 required)
#   has_vuln=false: 4      (>= 3 required)

